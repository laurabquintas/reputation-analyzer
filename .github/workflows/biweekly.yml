name: Biweekly Reputation Update

on:
  schedule:
    - cron: "0 6 1,15 * *" # 1st and 15th of each month, 06:00 UTC
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Show Python version on self-hosted runner
        run: python3 --version

      - name: Set up virtualenv and install deps
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -r requirements.txt
          .venv/bin/pip install pytest

      - name: Run unit tests
        run: .venv/bin/python -m pytest -q

  scrape-all:
    runs-on: self-hosted
    needs: test
    permissions:
      contents: read
    outputs:
      scrape_outcome: ${{ steps.scrape.outcome }}
      has_issues: ${{ steps.evaluate.outputs.has_issues }}
      issue_count: ${{ steps.evaluate.outputs.issue_count }}
    steps:
      - uses: actions/checkout@v4

      - name: Show Python version on self-hosted runner
        run: python3 --version

      - name: Set up virtualenv and install deps
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -U pip
          .venv/bin/pip install -r requirements.txt

      - name: Run weekly scraping
        id: scrape
        continue-on-error: true
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          TRIPADVISOR_API_KEY: ${{ secrets.TRIPADVISOR_API_KEY }}
        run: |
          .venv/bin/python -m src.run --summary-json data/run_summary.json --date $(date -u +%F)

      - name: Scrape TripAdvisor reviews
        continue-on-error: true
        env:
          TRIPADVISOR_API_KEY: ${{ secrets.TRIPADVISOR_API_KEY }}
        run: |
          .venv/bin/python src/sites/tripadvisor_reviews.py --date $(date -u +%F)

      - name: Scrape Google reviews
        continue-on-error: true
        env:
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
        run: |
          .venv/bin/python src/sites/google_reviews.py --date $(date -u +%F)

      - name: Scrape HolidayCheck reviews
        continue-on-error: true
        run: |
          .venv/bin/python src/sites/holidaycheck_reviews.py --date $(date -u +%F)

      - name: Upload run summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-summary
          path: data/run_summary.json
          if-no-files-found: warn

      - name: Upload updated CSV files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: updated-csvs
          path: data/*.csv
          if-no-files-found: warn

      - name: Upload reviews JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: updated-reviews
          path: |
            data/tripadvisor_reviews.json
            data/google_reviews.json
            data/holidaycheck_reviews.json
          if-no-files-found: warn

      - name: Evaluate run summary
        id: evaluate
        if: always()
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          p = Path("data/run_summary.json")
          has_issues = False
          issue_count = 0
          if p.exists():
            data = json.loads(p.read_text(encoding="utf-8"))
            results = data.get("results", [])
            issue_count = sum(1 for r in results if str(r.get("status", "")).lower() != "ok")
            has_issues = issue_count > 0

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write(f"has_issues={'true' if has_issues else 'false'}\n")
            fh.write(f"issue_count={issue_count}\n")
          PY

  commit-data:
    if: always()
    runs-on: self-hosted
    needs: scrape-all
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download run summary
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: run-summary
          path: data

      - name: Download updated CSV files
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: updated-csvs
          path: data

      - name: Download updated reviews JSON
        if: always()
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: updated-reviews
          path: data

      - name: Commit updated data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.csv data/*.json 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git commit -m "chore(data): biweekly score update $(date -u +%F)"
          git push

      - name: Compose alert email body
        id: compose_alert
        if: needs['scrape-all'].outputs.has_issues == 'true'
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = Path("data/run_summary.json")
          lines = ["Execution summary:"]

          if summary_path.exists():
            data = json.loads(summary_path.read_text(encoding="utf-8"))
            for result in data.get("results", []):
              site = result.get("site", "UNKNOWN")
              status = result.get("status", "unknown")
              message = result.get("message", "")
              duration = result.get("duration_seconds", 0)
              lines.append(f"- {site}: {status} | {message} ({duration}s)")
          else:
            lines.append("- run_summary.json not found.")

          lines.extend([
            "",
            f"Run: {os.environ['GITHUB_SERVER_URL']}/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
          ])

          body = "\n".join(lines)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
            fh.write("body<<EOF\n")
            fh.write(body)
            fh.write("\nEOF\n")
          PY

      - name: Send alert email on issues
        if: needs['scrape-all'].outputs.has_issues == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "[Reputation Analyzer] Workflow issues detected"
          to: ${{ secrets.ALERT_EMAIL_TO }}
          from: ${{ secrets.ALERT_EMAIL_FROM }}
          secure: true
          body: ${{ steps.compose_alert.outputs.body }}
          attachments: data/run_summary.json

      - name: Mark workflow failed if scraping failed
        if: needs['scrape-all'].outputs.scrape_outcome == 'failure'
        run: |
          echo "One or more scrapers failed. Partial CSV updates were still committed."
          exit 1
